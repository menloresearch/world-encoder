<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Encoder — data &amp; metrics</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header class="topbar">
  <h1>World Encoder</h1>
  <nav class="tabs" role="tablist">
    <button id="tab-data" class="tab active" role="tab" aria-selected="true">Training data</button>
    <button id="tab-metrics" class="tab" role="tab" aria-selected="false">Metrics</button>
  </nav>
  <span id="root-info" class="root-info"></span>
</header>

<main>
  <section id="view-data" class="view">
    <aside class="sidebar">
      <div id="cfg-pills" class="pill-row" aria-label="config"></div>
      <div id="scene-filters" class="scene-filters" aria-label="filter scenes by number">
        <input id="f-task" class="col-filter" type="number" min="1" step="1"
               placeholder="task #" aria-label="task number" autocomplete="off">
        <input id="f-user" class="col-filter" type="number" min="1" step="1"
               placeholder="user #" aria-label="user number" autocomplete="off">
        <input id="f-scene" class="col-filter" type="number" min="1" step="1"
               placeholder="scene #" aria-label="scene number" autocomplete="off">
      </div>
      <label id="split-filter-row" class="split-filter-row" hidden>
        <span class="muted">split</span>
        <select id="f-split" aria-label="train/test split filter">
          <option value="all">all</option>
          <option value="train">train only</option>
          <option value="test">test only</option>
        </select>
      </label>
      <div id="scene-count" class="muted"></div>
      <div id="scene-list" class="scene-list"></div>
    </aside>
    <div class="content">
      <div id="player-empty" class="empty-state">
        <p>Pick a config and a scene on the left to view its frames.</p>
      </div>
      <div id="player" class="player" hidden>
        <h2 id="player-title"></h2>
        <div id="cam-pills" class="pill-row" aria-label="camera"></div>
        <div class="frame-box"><img id="frame-img" alt="training frame"></div>
        <div class="controls">
          <button id="btn-play" class="btn" aria-label="play or pause">▶</button>
          <input id="scrub" type="range" min="0" max="0" value="0" step="1">
          <span id="frame-label" class="frame-label muted"></span>
          <select id="speed" aria-label="playback speed">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="4">4×</option>
          </select>
        </div>
        <p class="muted hint">Space = play/pause · ←/→ = step one frame</p>
        <div id="state-section" class="state-section" hidden>
          <h2>Robot state <span class="muted">(as the dataloader sees it — 28-dim, click a chart to seek)</span></h2>
          <div id="state-body"></div>
        </div>
      </div>
    </div>
  </section>

  <section id="view-metrics" class="view" hidden>
    <div id="metrics-body" class="metrics-body">
      <p class="muted">Loading metrics…</p>
    </div>
  </section>
</main>

<div id="tooltip" class="tooltip" hidden></div>
<script src="/static/app.js"></script>
</body>
</html>
