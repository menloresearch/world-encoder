# Latent-conditioned pixel decode: reconstruct robot frames from the frozen world-encoder z_v.
# Stripped-down t2i PixNerd (small DiT, our LatentConditioner + RobotLatentDataset, PixelAE,
# plain flow-matching trainer — no DINOv2/REPA, no WandB, no cluster plugins). 128px.
# lightning.pytorch
seed_everything: true
tags:
  exp: &exp robot_decode_ur5_128
trainer:
  default_root_dir: /mnt/nas/data/RH20T/decode/ur5_state/run
  accelerator: gpu
  strategy: auto
  devices: 1
  num_nodes: 1
  precision: bf16-mixed
  logger:
    class_path: lightning.pytorch.loggers.CSVLogger
    init_args:
      save_dir: /mnt/nas/data/RH20T/decode/ur5_state/run
      name: csv
  max_steps: 20000
  num_sanity_val_steps: 0
  limit_val_batches: 0
  val_check_interval: null
  check_val_every_n_epoch: null
  log_every_n_steps: 50
  use_distributed_sampler: false
  callbacks:
    - class_path: src.callbacks.model_checkpoint.CheckpointHook
      init_args:
        every_n_train_steps: 5000
        save_top_k: -1
        save_last: true
model:
  vae:
    class_path: src.models.autoencoder.pixel.PixelAE
    init_args:
      scale: 1.0
  denoiser:
    class_path: src.models.transformer.pixnerd_t2i.PixNerDiT
    init_args:
      in_channels: 3
      patch_size: 16
      num_groups: 16
      hidden_size: 512
      decoder_hidden_size: 64
      num_encoder_blocks: 8
      num_decoder_blocks: 2
      num_text_blocks: 2
      txt_embed_dim: 256
      txt_max_length: 1
  conditioner:
    class_path: src.models.conditioner.latent.LatentConditioner
    init_args:
      dim: 256
  diffusion_trainer:
    class_path: src.diffusion.flow_matching.training.FlowMatchingTrainer
    init_args:
      lognorm_t: true
      timeshift: 1.0
      scheduler: src.diffusion.flow_matching.scheduling.LinearScheduler
  diffusion_sampler:
    class_path: src.diffusion.flow_matching.sampling.EulerSampler
    init_args:
      num_steps: 50
      guidance: 2.0
      guidance_interval_min: 0.0
      guidance_interval_max: 1.0
      scheduler: src.diffusion.flow_matching.scheduling.LinearScheduler
      w_scheduler: src.diffusion.flow_matching.scheduling.LinearScheduler
      guidance_fn: src.diffusion.base.guidance.simple_guidance_fn
      step_fn: src.diffusion.flow_matching.sampling.ode_step_fn
  ema_tracker:
    class_path: src.callbacks.simple_ema.SimpleEMA
    init_args:
      decay: 0.9999
  optimizer:
    class_path: torch.optim.AdamW
    init_args:
      lr: 1e-4
      weight_decay: 0.0
data:
  train_dataset:
    class_path: src.data.dataset.robot_latent.RobotLatentDataset
    init_args:
      frames_txt: /mnt/nas/data/RH20T/decode/ur5_state/frames_train.txt
      zv_npy: /mnt/nas/data/RH20T/decode/ur5_state/zv_train.npy
      resolution: 128
  train_batch_size: 32
  train_num_workers: 8
